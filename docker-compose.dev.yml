# Dev: сборка из исходников. См. README.
services:
  postgres:
    image: postgres:16
    container_name: transay-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transay}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-transay}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: gglebux/transay-backend:latest
    container_name: transay-backend
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    ports:
      - "8081:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: gglebux/transay-frontend:latest
    container_name: transay-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: transay-portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9443:9443"
    restart: unless-stopped

volumes:
  postgres_data:
  portainer_data:
