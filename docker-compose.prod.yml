# Прод-запуск из ГОТОВЫХ образов DockerHub — исходный код на сервере НЕ нужен.
# На сервере достаточно двух файлов: этот docker-compose.prod.yml и .env.
#
# Старт / обновление одной командой (--pull always подтянет свежие образы):
#   docker compose -f docker-compose.prod.yml up -d --pull always
#
# Автообновление при каждом push в main (опционально):
#   docker compose --profile autoupdate -f docker-compose.prod.yml up -d --pull always

services:
  postgres:
    image: postgres:16
    container_name: transay-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transay}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD обязателен в .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-transay}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: gglebux/transay-backend:latest
    container_name: transay-backend
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"   # watchtower обновляет только помеченные
    # Порт наружу НЕ публикуем — бэк доступен фронт-nginx'у по внутренней сети.

  frontend:
    image: gglebux/transay-frontend:latest
    container_name: transay-frontend
    depends_on:
      - backend
    ports:
      - "80:80"               # единственный публичный порт; за TLS поставь Caddy/Traefik (см. README)
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # --- Опциональное автообновление (CI запушил образ → сервер сам перезапустился) ---
  # Включается профилем autoupdate, чтобы не работать без надобности.
  watchtower:
    image: containrrr/watchtower
    container_name: transay-watchtower
    profiles: ["autoupdate"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup --label-enable
    restart: unless-stopped

volumes:
  postgres_data:
