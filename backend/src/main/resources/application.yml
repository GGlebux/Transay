spring:
  jpa:
    hiddenmethod:
      filter:
        enabled: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_updates: true
        order_inserts: true

  mail:
    host: ${EMAIL_SERVER}
    port: ${EMAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000


  flyway:
    enabled: true
    locations: classpath:db/migration
    fail-on-missing-locations: true

jwt:
  secret: ${JWT_SECRET}
  access-ttl-minutes: 15
  refresh-ttl-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,logfile
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
  health:
    mail:
      enabled: false

logging:
  file:
    name: /tmp/transay/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5